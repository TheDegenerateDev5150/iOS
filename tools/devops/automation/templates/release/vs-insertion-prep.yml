parameters:
- name: buildStage
  type: string

- name: dependsOn
  type: object
  default: null

- name: isPR
  type: boolean

- name: repositoryAlias
  type: string
  default: self

- name: commit
  type: string
  default: HEAD

- name: pushNugets
  type: boolean
  default: true

- name: pushNugetsToMaestro
  type: boolean
  default: true

- name: stageDisplayNamePrefix
  type: string
  default: ''

- name: uploadPrefix
  type: string
  default: '$(MaciosUploadPrefix)'

stages:
- stage: prepare_release
  displayName: '${{ parameters.stageDisplayNamePrefix }}Prepare .NET Release'
  ${{ if parameters.dependsOn }}:
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(
        or(
          eq(dependencies.${{ parameters.buildStage }}.result, 'Succeeded'),
          eq(dependencies.${{ parameters.buildStage }}.result, 'SucceededWithIssues')
        ),
        eq(${{ parameters.isPR }}, false)
      )
  ${{ else }}:
    condition: eq(${{ parameters.isPR }}, false)

  jobs:
  # Check - "xamarin-macios (Prepare Release Sign NuGets)"
  - template: sign-artifacts/jobs/v4.yml@yaml-templates
    parameters:
      timeoutInMinutes: 120
      uploadBinlogs: true
      uploadPrefix: ${{ parameters.uploadPrefix }}
      enabledCredScan: false
      checkoutType: ${{ parameters.repositoryAlias }}
      signedArtifactName: '${{ parameters.uploadPrefix }}nuget-signed'
      artifactName: '${{ parameters.uploadPrefix }}not-signed-package'
      signType: Real
      usePipelineArtifactTasks: true
      setupSteps:
      - template: tools/devops/automation/templates/common/checkout.yml@${{ parameters.repositoryAlias }}
        parameters:
          isPR: ${{ parameters.isPR }}
          repositoryAlias: ${{ parameters.repositoryAlias }}
          commit: ${{ parameters.commit }}

      - pwsh: |
            Write-Host "##vso[task.setvariable variable=DYLD_INSERT_LIBRARIES]"
        displayName: 'Disable CodeQL'
        name: disableCodeQLOnArm64

  # Check - "xamarin-macios (Prepare Release Convert NuGet to MSI)"
  - template: nuget-msi-convert/job/v4.yml@yaml-templates
    parameters:
      use1ESTemplate: true
      yamlResourceName: yaml-templates
      dependsOn: signing
      condition: ne(stageDependencies.configure_build.configure.outputs['configure_platforms.DOTNET_PLATFORMS'], '')
      artifactName: '${{ parameters.uploadPrefix }}nuget-signed'
      propsArtifactName: ${{ parameters.uploadPrefix }}not-signed-package
      binlogsArtifactName: ${{ parameters.uploadPrefix }}nuget-msi-convert-binlogs
      signType: Real
      preConvertSteps:
      - pwsh: |
          New-Item "$(System.DefaultWorkingDirectory)/$(BUILD_REPOSITORY_TITLE)/tools/devops/governance" -ItemType Directory -ea 0
          New-Item -Path "$(System.DefaultWorkingDirectory)/$(BUILD_REPOSITORY_TITLE)/tools/devops/governance" -Name "CredScanSuppressions.json" -Value '{"tool":"Crendential Scanner", "supressions":[]}'
        displayName: Create credscan dummy ignore file

      postConvertSteps:
      - task: DownloadPipelineArtifact@2
        inputs:
          artifactName: '${{ parameters.uploadPrefix }}not-signed-package'
          downloadPath: $(Build.StagingDirectory)\sign-verify
          patterns: |
            **/SignVerifyIgnore.txt

      - task: MicroBuildCodesignVerify@3
        displayName: verify signed msi content
        inputs:
          TargetFolders: |
            $(Build.ArtifactStagingDirectory)\bin\manifests
            $(Build.ArtifactStagingDirectory)\bin\manifests-packs
            $(Build.ArtifactStagingDirectory)\bin\msi-nupkgs
          ExcludeSNVerify: true
          ApprovalListPathForCerts: $(Build.StagingDirectory)\sign-verify\SignVerifyIgnore.txt

  - ${{ if eq(parameters.pushNugets, true) }}:
    # Check - "xamarin-macios (Prepare Release Push NuGets)"
    - job: push_signed_nugets
      displayName: Push NuGets
      dependsOn: [signing, nuget_convert]
      condition: and(
          or(
            eq(dependencies.signing.result, 'Succeeded'), 
            eq(dependencies.signing.result, 'SucceededWithIssues')
          ),
          or(
            eq(dependencies.nuget_convert.result, 'Succeeded'), 
            eq(dependencies.nuget_convert.result, 'SucceededWithIssues'),
            eq(dependencies.nuget_convert.result, 'Skipped')
          )
        )
      variables:
      - name: skipNugetSecurityAnalysis
        value: true
      - name: DOTNET_PLATFORMS
        value: $[ stageDependencies.configure_build.configure.outputs['configure_platforms.DOTNET_PLATFORMS'] ]
      - name: INCLUDE_DOTNET_IOS
        value: $[ stageDependencies.configure_build.configure.outputs['configure_platforms.INCLUDE_DOTNET_IOS'] ]
      - name: INCLUDE_DOTNET_MACCATALYST
        value: $[ stageDependencies.configure_build.configure.outputs['configure_platforms.INCLUDE_DOTNET_MACCATALYST'] ]
      - name: INCLUDE_DOTNET_MACOS
        value: $[ stageDependencies.configure_build.configure.outputs['configure_platforms.INCLUDE_DOTNET_MACOS'] ]
      - name: INCLUDE_DOTNET_TVOS
        value: $[ stageDependencies.configure_build.configure.outputs['configure_platforms.INCLUDE_DOTNET_TVOS'] ]
      pool:
        name: AzurePipelines-EO
        demands:
        - ImageOverride -equals 1ESPT-Windows2022
      templateContext:
        outputs:
        - output: artifactsDrop
          dropServiceURI: https://devdiv.artifacts.visualstudio.com/DefaultCollection
          buildNumber: $(ReleaseDropPrefix)/symbols
          dropMetadataContainerName: DropMetadata-shipping-symbols
          sourcePath: $(Build.StagingDirectory)\symbols
          retentionDays: 120
          toLowerCase: false
      steps:
      - pwsh: |
          New-Item "$(System.DefaultWorkingDirectory)/$(BUILD_REPOSITORY_TITLE)/tools/devops/governance" -ItemType Directory -ea 0
          New-Item -Path "$(System.DefaultWorkingDirectory)/$(BUILD_REPOSITORY_TITLE)/tools/devops/governance" -Name "CredScanSuppressions.json" -Value '{"tool":"Crendential Scanner", "supressions":[]}'
        displayName: Create credscan dummy ignore file

      - bash: make -C builds download
        displayName: "Install local .NET"

      - task: DownloadPipelineArtifact@2
        inputs:
          artifactName: not-signed-package-symbols
          downloadPath: $(Build.StagingDirectory)\symbols

      - powershell: |
          $buildNumber = "$(Build.BuildNumber)"
          Write-Host "##vso[task.setvariable variable=ReleaseDropPrefix]$buildNumber"
        displayName: Set fallback ReleaseDropPrefix
        condition: and(succeeded(), eq(variables['DOTNET_PLATFORMS'], ''))

      - task: DownloadPipelineArtifact@2
        inputs:
          artifactName: DropMetadata-shipping-nugets
          downloadPath: $(Build.StagingDirectory)\metadata
        displayName: Download nugets drop metadata
        condition: and(succeeded(), ne(variables['DOTNET_PLATFORMS'], ''))

      - powershell: |
          $jsonContent = Get-Content -Path "$(Build.StagingDirectory)\metadata\VSTSDrop.json" -Raw | ConvertFrom-Json
          $dropPrefix = $jsonContent.VstsDropBuildArtifact.VstsDropUrl -replace 'https://devdiv.artifacts.visualstudio.com/DefaultCollection/_apis/drop/drops/' -replace '/nugets'
          Write-Host "##vso[task.setvariable variable=ReleaseDropPrefix]$dropPrefix"
        displayName: Set variable ReleaseDropPrefix
        condition: and(succeeded(), ne(variables['DOTNET_PLATFORMS'], ''))

      # Download nugets drop created by nuget-msi-convert/job/v4.yml and publish to maestro
      - task: ms-vscs-artifact.build-tasks.artifactDropDownloadTask-1.artifactDropDownloadTask@1
        displayName: Download $(ReleaseDropPrefix)/nugets
        inputs:
          dropServiceURI: https://devdiv.artifacts.visualstudio.com/DefaultCollection
          buildNumber: $(ReleaseDropPrefix)/nugets
          destinationPath: $(Build.StagingDirectory)\nuget-signed
        condition: and(succeeded(), ne(variables['DOTNET_PLATFORMS'], ''))

      # Download signed nugets from pipeline artifact when nuget-msi-convert was skipped
      - task: DownloadPipelineArtifact@2
        inputs:
          artifactName: '${{ parameters.uploadPrefix }}nuget-signed'
          downloadPath: $(Build.StagingDirectory)\nuget-signed
        displayName: Download signed nugets from pipeline artifact
        condition: and(succeeded(), eq(variables['DOTNET_PLATFORMS'], ''))

      - script: make -C $(Build.SourcesDirectory)/dotnet setup-publish-bar-manifest
        displayName: make setup-publish-bar-manifest

      - pwsh: |
          gci env: | format-table -autosize -wrap
          Get-ChildItem -Name -Recurse -Path $(Build.StagingDirectory)
          $varMap = [ordered]@{ "INCLUDE_DOTNET_IOS" = "iOS"; "INCLUDE_DOTNET_MACCATALYST" = "MacCatalyst"; "INCLUDE_DOTNET_MACOS" = "macOS"; "INCLUDE_DOTNET_TVOS" = "tvOS" }
          foreach ($varName in $varMap.Keys) {
              if ([Environment]::GetEnvironmentVariable($varName)) {
                  Write-Host "Variable '$varName' was set, setting MaestroProjectPlatformName to '$($varMap[$varName])'"
                  Write-Host "##vso[task.setvariable variable=MaestroProjectPlatformName]$($varMap[$varName])"
                  exit 0;
              }
          }
          # Fallback to iOS when no platforms are configured (e.g. ONLY_SHARPIE)
          Write-Host "No platform variable was set, defaulting MaestroProjectPlatformName to 'iOS'"
          Write-Host "##vso[task.setvariable variable=MaestroProjectPlatformName]iOS"
        displayName: Set maestro project variable

      - task: AzureCLI@2
        displayName: generate and publish BAR manifest
        inputs:
          azureSubscription: "Darc: Maestro Production"
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: >-
            $(Build.SourcesDirectory)\builds\downloads\dotnet\dotnet.exe
            build
            $(Build.SourcesDirectory)\dotnet\package\Microsoft.$(MaestroProjectPlatformName).Ref\package.csproj
            -t:PushManifestToBuildAssetRegistry
            -p:NupkgPath=$(Build.StagingDirectory)\nuget-signed
            -p:PrereleaseIdentifier=$(PrereleaseIdentifier)
            -bl:$(Build.StagingDirectory)\maestro-binlogs\generate-bar-manifest.binlog
          workingDirectory: $(Build.SourcesDirectory)\..
        condition: and(succeeded(), eq('${{ parameters.pushNugetsToMaestro }}', 'true'))

      - task: AzureCLI@2
        inputs:
          azureSubscription: "Darc: Maestro Production"
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            $versionEndpoint = 'https://maestro.dot.net/api/assets/darc-version?api-version=2019-01-16'
            $darcVersion = $(Invoke-WebRequest -Uri $versionEndpoint -UseBasicParsing).Content
            $arcadeServicesSource = 'https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json'
            # Write an isolated NuGet.config that
            # clears all sources and lists only the internal dnceng feed, and pass it via --configfile so
            # 'dotnet tool update' never probes a public feed.
            $darcNuGetConfig = Join-Path "$(Agent.TempDirectory)" 'darc-nuget.config'
            Set-Content -Path $darcNuGetConfig -Encoding utf8 -Value @(
              '<?xml version="1.0" encoding="utf-8"?>',
              '<configuration>',
              '  <packageSources>',
              '    <clear />',
              "    <add key=""dotnet-eng"" value=""$arcadeServicesSource"" />",
              '  </packageSources>',
              '</configuration>')
            & dotnet tool update microsoft.dotnet.darc --version "$darcVersion" --configfile "$darcNuGetConfig" --tool-path $(Agent.ToolsDirectory)\darc -v n
            & $(Agent.ToolsDirectory)\darc\darc add-build-to-channel --default-channels --id $(BARBuildId) --ci --publishing-infra-version 3 --azdev-pat $(System.AccessToken)
          # We can't use the global.json located in the root of our repo, because makes it required to use the exact .NET version we're referencing in our eng/Versions.Details.xml file.
          # So in order to not use it, we set the working directory to the parent directory of our repository.
          workingDirectory: $(Build.SourcesDirectory)\..
        displayName: Add builds to default darc channel
        condition: and(succeeded(), eq('${{ parameters.pushNugetsToMaestro }}', 'true'))

      - template: ../common/publish-pipeline-artifact.yml
        parameters:
          use1ES: true
          displayName: 'Publish Artifact: maestro-binlogs'
          path: $(Build.StagingDirectory)\maestro-binlogs
          artifact: ${{ parameters.uploadPrefix }}maestro-binlogs-$(System.JobAttempt)
          condition: and(succeededOrFailed(), eq('${{ parameters.pushNugetsToMaestro }}', 'true'))
          continueOnError: true

  - job: post_github_comment
    displayName: Post GitHub Comment
    ${{ if eq(parameters.pushNugets, true) }}:
      dependsOn: [signing, nuget_convert, push_signed_nugets]
    ${{ else }}:
      dependsOn: [signing, nuget_convert]
    condition: succeededOrFailed()
    pool:
      name: AzurePipelines-EO
      demands:
      - ImageOverride -equals 1ESPT-Windows2022
    variables:
    - name: SIGNING_RESULT
      value: $[ dependencies.signing.result ]
    - name: NUGET_CONVERT_RESULT
      value: $[ dependencies.nuget_convert.result ]
    - name: PUSH_NUGETS_RESULT
      ${{ if eq(parameters.pushNugets, true) }}:
        value: $[ dependencies.push_signed_nugets.result ]
      ${{ else }}:
        value: 'Skipped'
    steps:
    - template: ../common/checkout.yml
      parameters:
        isPR: ${{ parameters.isPR }}
        repositoryAlias: ${{ parameters.repositoryAlias }}
        commit: ${{ parameters.commit }}

    - pwsh: |
        Write-Host "##vso[task.setvariable variable=DYLD_INSERT_LIBRARIES]"
      displayName: 'Disable CodeQL'

    - task: DownloadPipelineArtifact@2
      displayName: 'Download signed NuGets'
      inputs:
        artifactName: '${{ parameters.uploadPrefix }}nuget-signed'
        downloadPath: $(Build.StagingDirectory)\nuget-signed
      condition: in(variables['SIGNING_RESULT'], 'Succeeded', 'SucceededWithIssues')
      continueOnError: true

    - pwsh: |
        Import-Module $Env:SYSTEM_DEFAULTWORKINGDIRECTORY\$Env:BUILD_REPOSITORY_TITLE\tools\devops\automation\scripts\MaciosCI.psd1

        $signingResult = $Env:SIGNING_RESULT
        $nugetConvertResult = $Env:NUGET_CONVERT_RESULT
        $pushNugetsResult = $Env:PUSH_NUGETS_RESULT
        $pushNugetsEnabled = '${{ parameters.pushNugets }}' -eq 'True'
        $pushToMaestroEnabled = '${{ parameters.pushNugetsToMaestro }}' -eq 'True'

        function Test-JobSucceeded([string] $result) {
            return ($result -eq 'Succeeded' -or $result -eq 'SucceededWithIssues')
        }

        function Test-JobAcceptable([string] $result) {
            return (Test-JobSucceeded $result) -or ($result -eq 'Skipped')
        }

        $allSucceeded = (Test-JobSucceeded $signingResult) `
                    -and (Test-JobAcceptable $nugetConvertResult) `
                    -and (-not $pushNugetsEnabled -or (Test-JobSucceeded $pushNugetsResult))

        $content = [System.Text.StringBuilder]::new()

        if (-not $allSucceeded) {
            $content.AppendLine("The following jobs reported a non-successful result:")
            $content.AppendLine()
            $content.AppendLine("| Job | Result |")
            $content.AppendLine("| --- | ------ |")

            $resultEmoji = @{
                "Succeeded" = ":white_check_mark: Succeeded"
                "SucceededWithIssues" = ":warning: Succeeded with issues"
                "Failed" = ":x: Failed"
                "Canceled" = ":no_entry_sign: Canceled"
                "Skipped" = ":next_track_button: Skipped"
            }

            function Get-ResultText([string] $result) {
                if ($resultEmoji.ContainsKey($result)) { return $resultEmoji[$result] }
                return $result
            }

            $content.AppendLine("| Sign NuGets | $(Get-ResultText $signingResult) |")
            $content.AppendLine("| Convert NuGet to MSI | $(Get-ResultText $nugetConvertResult) |")
            if ($pushNugetsEnabled) {
                $content.AppendLine("| Push NuGets | $(Get-ResultText $pushNugetsResult) |")
            }
            $content.AppendLine()
        }

        $nugetDir = Join-Path $Env:BUILD_STAGINGDIRECTORY "nuget-signed"
        if (Test-Path $nugetDir) {
            $nupkgs = Get-ChildItem -Path $nugetDir -Recurse -Filter "*.nupkg" |
                Where-Object { $_.Name -notlike "*.symbols.nupkg" } |
                Select-Object -ExpandProperty Name |
                Sort-Object

            if ($nupkgs.Count -gt 0) {
                $platforms = [ordered]@{
                    "iOS" = [System.Collections.ArrayList]@()
                    "MacCatalyst" = [System.Collections.ArrayList]@()
                    "macOS" = [System.Collections.ArrayList]@()
                    "tvOS" = [System.Collections.ArrayList]@()
                    "Other" = [System.Collections.ArrayList]@()
                }

                foreach ($nupkg in $nupkgs) {
                    if ($nupkg -match '(?i)^Microsoft\.(iOS|NET\.Sdk\.iOS)') {
                        $null = $platforms["iOS"].Add($nupkg)
                    } elseif ($nupkg -match '(?i)^Microsoft\.(MacCatalyst|NET\.Sdk\.MacCatalyst)') {
                        $null = $platforms["MacCatalyst"].Add($nupkg)
                    } elseif ($nupkg -match '(?i)^Microsoft\.(macOS|NET\.Sdk\.macOS)') {
                        $null = $platforms["macOS"].Add($nupkg)
                    } elseif ($nupkg -match '(?i)^Microsoft\.(tvOS|NET\.Sdk\.tvOS)') {
                        $null = $platforms["tvOS"].Add($nupkg)
                    } else {
                        $null = $platforms["Other"].Add($nupkg)
                    }
                }

                $content.AppendLine("<details>")
                if ($allSucceeded) {
                    $content.AppendLine("<summary>:package: Published NuGet packages ($($nupkgs.Count) packages)</summary>")
                } else {
                    $content.AppendLine("<summary>:package: Signed NuGet packages ($($nupkgs.Count) packages)</summary>")
                }
                $content.AppendLine()

                foreach ($platform in $platforms.Keys) {
                    $pkgs = $platforms[$platform]
                    if ($pkgs.Count -gt 0) {
                        $content.AppendLine("#### $platform")
                        foreach ($pkg in $pkgs) {
                            $content.AppendLine("- ``$pkg``")
                        }
                        $content.AppendLine()
                    }
                }

                $content.AppendLine("</details>")
                $content.AppendLine()
            }
        }

        if (-not $Env:GITHUB_TOKEN -or $Env:GITHUB_TOKEN.StartsWith('$(')) {
            Write-Warning "GitHub token not available, skipping comment posting."
            Write-Host "Comment that would have been posted:"
            Write-Host $content.ToString()
            exit 0
        }

        $commentHash = $Env:COMMENT_HASH
        if (-not $commentHash) {
            $commentHash = $Env:BUILD_SOURCEVERSION
        }

        $githubComments = New-GitHubCommentsObjectFromUrl -Url "$(Build.Repository.Uri)" -Token $Env:GITHUB_TOKEN -Hash $commentHash

        if ($allSucceeded) {
            $title = "Prepare .NET Release succeeded"
            $emoji = ":white_check_mark:"
        } else {
            $title = "Prepare .NET Release failed"
            $emoji = ":x:"
        }

        $result = $githubComments.NewCommentFromMessage($title, $emoji, $content.ToString(), "prepare-release")
      displayName: 'Post GitHub comment for Prepare .NET Release'
      timeoutInMinutes: 10
      continueOnError: true
      condition: succeededOrFailed()
      env:
        GITHUB_TOKEN: $(GitHub.Token)
        ${{ if eq(parameters.repositoryAlias, 'self') }}:
          COMMENT_HASH: $(fix_commit.GIT_HASH)
        ${{ else }}:
          COMMENT_HASH: $(Build.SourceVersion)
